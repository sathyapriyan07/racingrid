<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Offline — F1Base</title>
    <style>
      :root {
        --bg: #000000;
        --card: #111111;
        --text: #ffffff;
        --muted: rgba(255,255,255,0.72);
        --border: rgba(255,255,255,0.10);
        --accent: #E10600;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --card: #ffffff;
          --text: #0f172a;
          --muted: rgba(15,23,42,0.65);
          --border: rgba(0,0,0,0.08);
          --accent: #E10600;
        }
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 22px 20px;
        box-shadow: 0 6px 30px rgba(0,0,0,0.30);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        background: var(--accent);
        display: inline-block;
        margin-right: 10px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 22px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 14px;
      }
      button {
        margin-top: 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 9999px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="display:flex;align-items:center;margin-bottom:10px;">
        <span class="dot"></span>
        <span style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;">F1Base</span>
      </div>
      <h1>You’re offline</h1>
      <p>This app can open pages you’ve already visited. Reconnect to the internet to load fresh data.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
